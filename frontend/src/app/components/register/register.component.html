<div class="auth-container">
  <div class="auth-left">
    <div class="auth-branding">
      <h1 class="brand-title">EPS</h1>
      <p class="brand-subtitle">Bienestar</p>
      <div class="brand-description">
        <p>Tu salud es nuestra prioridad</p>
        <p>Gestión integral de servicios de salud</p>
      </div>
    </div>
    <div class="auth-features">
      <div class="feature-item">
        <i class="fas fa-users"></i>
        <span>Afiliaciones y planes</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-calendar-check"></i>
        <span>Agendamiento de citas</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-file-medical-alt"></i>
        <span>Historial clínico</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-file-invoice-dollar"></i>
        <span>Facturación</span>
      </div>
    </div>
  </div>
  
  <div class="auth-right">
    <div class="auth-card">
      <h2>Crear Cuenta</h2>
      <p class="subtitle">Regístrate como afiliado EPS Bienestar</p>
      
      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" [(ngModel)]="nombre" name="nombre" 
                 placeholder="Juan Pérez" required>
        </div>
        
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" [(ngModel)]="email" name="email" 
                 placeholder="tu@email.com" required>
        </div>
        
        <div class="form-group">
          <label>Telefono Celular (Colombia)</label>
          <input type="number" [(ngModel)]="telefono" name="telefono"
                 placeholder="3001234567" required pattern="3[0-9]{9}" inputmode="numeric"
                 title="Número móvil colombiano - 10 dígitos, empieza con 3" 
                 maxlength="10" (input)="filtrarTelefono($event)" (keydown)="preventNonNumeric($event)">
        </div>

        <div class="form-group">
          <label>Tipo de Documento <span style="color: red;">*</span></label>
          <select [(ngModel)]="tipoDocumento" name="tipoDocumento" required (change)="actualizarLimitesFechaNacimiento()">
            <option value="">-- Seleccionar --</option>
            <option value="CC">Cédula de Ciudadanía (CC)</option>
            <option value="TI">Tarjeta de Identidad (TI)</option>
            <option value="RC">Registro Civil de Nacimiento (RC)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Número de Documento</label>
          <input type="text" [(ngModel)]="documento" name="documento"
                 placeholder="12345678" required
                 title="Número del documento seleccionado" 
                 maxlength="15" (input)="filtrarDocumento($event)">
        </div>

        <div class="form-group">
          <label>Fecha de Nacimiento <span style="color: red;">*</span></label>
          <input type="date" [(ngModel)]="fechaNacimiento" name="fechaNacimiento"
                 [max]="maxFechaNacimiento" [min]="minFechaNacimiento" required
                 [title]="mensajeFechaNacimiento"
                 (change)="onFechaNacimientoChange()">
          <small *ngIf="mensajeFechaNacimiento" class="help-text">{{ mensajeFechaNacimiento }}</small>
        </div>

        <div class="form-group">
          <label>Dirección</label>
          <input type="text" [(ngModel)]="direccion" name="direccion"
                 placeholder="Calle 123, Ciudad">
        </div>

        <div class="form-group">
          <label>Plan de Salud <span style="color: red;">*</span></label>
          <select [(ngModel)]="id_plan" name="plan" required>
            <option [ngValue]="null">-- Seleccionar --</option>
            <option *ngFor="let p of planes" [value]="p.id_plan">{{ p.nombre }} - ${{ p.costo }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password" 
                 placeholder="••••••••" required>
        </div>
        
        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" 
                 placeholder="••••••••" required>
        </div>
        
        <button type="submit" [disabled]="loading" class="btn-auth">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
        </button>
      </form>
      
      <p class="auth-link">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
      </p>
    </div>
  </div>
</div>
