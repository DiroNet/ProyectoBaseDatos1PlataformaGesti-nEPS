<div class="auth-container">
  <div class="auth-left">
    <div class="auth-branding">
      <h1 class="brand-title">Bienestar</h1>
      <p class="brand-subtitle">Centro Médico</p>
      <div class="brand-description">
        <p>Tu salud es nuestra prioridad</p>
        <p>Atención médica de calidad para ti y tu familia</p>
      </div>
    </div>
    <div class="auth-features">
      <div class="feature-item">
        <i class="fas fa-user-md"></i>
        <span>Médicos especializados</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-calendar-check"></i>
        <span>Citas en línea</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-file-medical-record"></i>
        <span>Historial médico digital</span>
      </div>
    </div>
  </div>
  
  <div class="auth-right">
    <div class="auth-card">
      <h2>Crear Cuenta</h2>
      
      <div *ngIf="showNotification" [class]="'notification ' + notificationType">
        <i [class]="notificationType === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'"></i>
        {{ notificationMessage }}
      </div>
      
      <div *ngIf="error && !showNotification" class="alert-error">
        {{ error }}
      </div>
      
      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" [(ngModel)]="nombre" name="nombre" 
                 placeholder="Juan Pérez" required>
        </div>
        
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" [(ngModel)]="email" name="email" 
                 placeholder="tu@email.com" required>
        </div>
        
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password" 
                 placeholder="••••••••" required>
        </div>
        
        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" 
                 placeholder="••••••••" required>
        </div>
        
        <button type="submit" [disabled]="loading" class="btn-auth">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
        </button>
      </form>
      
      <p class="auth-link">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
      </p>
    </div>
  </div>
</div>
